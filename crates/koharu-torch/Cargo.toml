[package]
name = "koharu-torch"
version.workspace = true
edition = "2021"
description = "Rust bindings for LibTorch with a dynamically loaded C++ shim."
license = "MIT OR Apache-2.0"
authors.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
keywords = ["pytorch", "libtorch", "tensor", "deep-learning", "machine-learning"]
categories = ["api-bindings", "science"]
publish = true

[dependencies]
lazy_static = "1.3.0"
libc = "0.2.0"
ndarray = "0.16.1"
rand = "0.8"
thiserror = "1"
koharu-torch-sys = { workspace = true }
zip = "0.6"
half = "2"
safetensors = "0.3.0"
image = { version = "0.24.5", optional = true }

[dev-dependencies]
anyhow = "^1.0.60"

[features]
cuda-tests = []

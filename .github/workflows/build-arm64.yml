name: Build Linux ARM64 Binary (With CUDA compilation)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            libgomp1 pkg-config llvm

      - name: Install CUDA Toolkit
        run: |
          sudo add-apt-repository -y multiverse
          sudo apt-get update
          sudo apt-get install -y nvidia-cuda-toolkit

      - name: Verify CUDA Compiler (nvcc)
        run: |
          nvcc --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS Dependencies
        run: bun install

      - name: Compile Koharu with CUDA Support
        run: |
          bun run build

      - name: Upload ARM64 Binary
        uses: actions/upload-artifact@v4
        with:
          name: koharu-linux-arm64-cuda
          path: target/release/koharu
